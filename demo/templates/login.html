<!DOCTYPE html>
<html>
<head>
    <title>Login — Aegis Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Aegis Admin</h1>
    <p class="text-sm text-gray-500 text-center mb-6">Sign in to continue</p>

    {% if error %}
    <div class="bg-red-50 border border-red-300 text-red-700 text-sm rounded px-4 py-2 mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
            <input
                type="text"
                id="username"
                name="username"
                autocomplete="username"
                required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                placeholder="aegis"
            />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                placeholder="••••••••"
            />
        </div>
        <button
            type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700 transition text-sm"
        >
            Sign in
        </button>
    </form>
</div>

</body>
</html>
