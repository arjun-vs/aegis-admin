<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} - Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

    <h1 class="text-2xl font-bold mb-4">404 - Not Found</h1>

</html>
