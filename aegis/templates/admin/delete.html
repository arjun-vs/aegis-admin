<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} - Delete {{ table_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <h1 class="text-2xl font-bold mb-6">
        {{ title }} → <a href="/admin/ui/{{ table_name }}/" class="text-blue-600 hover:underline">{{ table_name }}</a> → Delete #{{ pk_value }}
    </h1>

    <div class="bg-white shadow rounded-lg p-6 max-w-lg">
        <p class="text-gray-700 mb-4">
            Are you sure you want to delete this record? This action cannot be undone.
        </p>

        <div class="bg-gray-50 border border-gray-200 rounded p-4 mb-6">
            {% for key, value in values.items() %}
            <div class="flex gap-2 text-sm mb-1">
                <span class="font-medium text-gray-600 w-32">{{ key }}:</span>
                <span class="text-gray-800">{{ value }}</span>
            </div>
            {% endfor %}
        </div>

        <form method="post" action="/admin/ui/{{ table_name }}/{{ pk_value }}/delete/">
            <div class="flex items-center gap-4">
                <button
                    type="submit"
                    class="bg-red-600 text-white px-5 py-2 rounded hover:bg-red-700 font-medium"
                >
                    Delete
                </button>
                <a href="/admin/ui/{{ table_name }}/" class="text-gray-500 hover:underline">Cancel</a>
            </div>
        </form>
    </div>

</body>
</html>
