<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-56 bg-white shadow-md p-5 flex flex-col shrink-0">
        <h2 class="text-base font-bold text-gray-800 mb-6">{{ title }}</h2>
        <nav class="flex-1">
            <ul class="space-y-1">
                <li>
                    <a href="/admin/ui/"
                       class="block px-3 py-2 rounded text-sm font-semibold bg-gray-100 text-gray-800">
                        Dashboard
                    </a>
                </li>
                {% for model in models %}
                <li>
                    <a href="/admin/ui/{{ model.table_name }}/"
                       class="block px-3 py-2 rounded text-sm text-gray-600 hover:bg-gray-100">
                        {{ model.name }}
                    </a>
                </li>
                {% endfor %}
            </ul>
        </nav>
        <div class="pt-4 border-t mt-auto">
            <a href="/logout" class="text-sm text-gray-400 hover:text-red-500">Logout</a>
        </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 p-8">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Dashboard</h1>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {% for model in models %}
            <a href="/admin/ui/{{ model.table_name }}/"
               class="bg-white shadow rounded-lg p-5 hover:shadow-md hover:ring-2 hover:ring-blue-200 transition block">
                <div class="text-lg font-semibold text-gray-800 mb-1">{{ model.name }}</div>
                <div class="text-sm text-gray-400">{{ model.table_name }}</div>
                <div class="mt-3 text-blue-600 text-sm font-medium">View list →</div>
            </a>
            {% endfor %}
        </div>
    </main>
</div>

</body>
</html>
